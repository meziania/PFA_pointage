<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Système de Pointage</title>
  <!-- Fond arrondi bleu marine -->
  <rect width="32" height="32" rx="6" fill="#1A3557"/>

  <!-- Coin QR haut-gauche -->
  <rect x="4" y="4" width="10" height="10" rx="1.5" fill="white"/>
  <rect x="5.5" y="5.5" width="7" height="7" rx="1" fill="#1A3557"/>
  <rect x="7" y="7" width="4" height="4" rx="0.5" fill="white"/>

  <!-- Coin QR haut-droit -->
  <rect x="18" y="4" width="10" height="10" rx="1.5" fill="white"/>
  <rect x="19.5" y="5.5" width="7" height="7" rx="1" fill="#1A3557"/>
  <rect x="21" y="7" width="4" height="4" rx="0.5" fill="white"/>

  <!-- Coin QR bas-gauche -->
  <rect x="4" y="18" width="10" height="10" rx="1.5" fill="white"/>
  <rect x="5.5" y="19.5" width="7" height="7" rx="1" fill="#1A3557"/>
  <rect x="7" y="21" width="4" height="4" rx="0.5" fill="white"/>

  <!-- Pixels QR centre -->
  <rect x="18" y="19" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="21.5" y="19" width="2" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <rect x="25" y="19" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="18" y="22.5" width="2" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <rect x="21.5" y="22.5" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>

  <!-- Badge coche vert (coin bas-droit) -->
  <circle cx="26" cy="26" r="7" fill="#1A3557"/>
  <circle cx="26" cy="26" r="6" fill="#22C55E"/>
  <path d="M22.5 26 L25 28.5 L29.5 22.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
